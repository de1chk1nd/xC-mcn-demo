########################################
# Student identity
########################################
student:
  # DNS-safe: [a-z0-9-], 1-16 chars
  name: <STUDENT NAME>
  email: <STUDENT E-MAIL>
  #--- auto-populated ---
  ip-address:

########################################
# F5 Distributed Cloud (xC)
########################################
xC:
  tenant: <XC TENANT NAME>
  namespace: <NAMESPACE>
  p_12_pwd: <P12 PASSWORD STRING>
  #--- auto-detected / auto-derived ---
  p12_auth:                      # auto-detected from .xC/ directory
  tenant_shrt:                   # auto-derived from tenant
  tenant_api:                    # auto-derived from tenant_shrt
  tenant_anycast_ip:             # auto-fetched from xC API

########################################
# AWS credentials
# Set here or via env vars:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SESSION_TOKEN
# STS vs static is auto-detected.
########################################
aws:
  aws_access_key_id:
  aws_secret_access_key:
  aws_session_token:
  #--- defaults (usually no change) ---
  auth_profile: xc-mcn-lab
  region_site_1: eu-central-1
  region_site_2: eu-west-1

########################################
# BIG-IP
########################################
f5:
  f5_password: DefaultLabPwd!2026

########################################
# Certificates — auto-populated
########################################
cert:
  ca_dir: .cert/ca
  cert_dir: .cert/domains
  ca_key:
  ca_cert:
