########################################
# AWS credentials
# Set here or via env vars:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SESSION_TOKEN
########################################
aws:
  aws_access_key_id: <AWS ACCESS KEY>
  aws_secret_access_key: <AWS SECRET KEY>
  aws_session_token: <AWS SESSION TOKEN>
  tmp_aws_cred: true
  #--- no change needed below ---
  auth_profile: xc-mcn-lab
  region_site_1: eu-central-1
  region_site_2: eu-west-1

########################################
# Student identity
########################################
student:
  # DNS-safe: [a-z0-9-], 1-16 chars
  name: <STUDENT NAME>
  email: <STUDENT E-MAIL>
  #--- auto-populated ---
  ip-address: <AUTO-POPULATED>

########################################
# F5 Distributed Cloud (xC)
########################################
xC:
  p12_auth: .xC/<P12_CERT_FILE_NAME>.p12
  p_12_pwd: <P12 PASSWORD STRING>
  tenant: <XC TENANT NAME>
  namespace: <NAMESPACE>
  #--- auto-derived from tenant ---
  tenant_shrt: <AUTO-DERIVED>
  tenant_api: <AUTO-DERIVED>
  # Anycast IP — auto-fetched from API, or set manually for secondary IP
  tenant_anycast_ip: ""

########################################
# BIG-IP
########################################
f5:
  f5_password: DefaultLabPwd!2026

########################################
# Certificates — auto-populated
########################################
cert:
  ca_dir: .cert/ca
  cert_dir: .cert/domains
  ca_key: ""
  ca_cert: ""
