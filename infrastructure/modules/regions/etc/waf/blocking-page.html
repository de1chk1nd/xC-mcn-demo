<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #1e293b, #0f172a);
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #1e293b;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
        max-width: 500px;
        width: 90%;
    }

    .card img {
        max-width: 220px;
        margin-bottom: 20px;
    }

    h1 {
        margin: 0 0 10px;
        font-size: 28px;
        color: #f87171;
    }

    p {
        font-size: 16px;
        line-height: 1.5;
        color: #cbd5f5;
    }

    .req-id {
        margin-top: 20px;
        font-size: 14px;
        color: #94a3b8;
        background: #0f172a;
        padding: 10px;
        border-radius: 8px;
        word-break: break-all;
    }

    a {
        display: inline-block;
        margin-top: 25px;
        padding: 10px 20px;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.2s;
    }

    a:hover {
        background: #2563eb;
    }
</style>
</head>

<body>

<div class="card">

    <img src="https://github.com/de1chk1nd/xC-mcn-demo/raw/main/docs/images/misc/pew-pew.png" alt="Blocked">

    <h1>Access Denied</h1>

    <p>
        The requested URL has been blocked.<br>
        Please contact your administrator if you believe this is an error.
    </p>

    <div class="req-id">
        Request ID: {{request_id}}
    </div>

    <a href="javascript:history.back()">Go Back</a>

</div>

</body>
</html>
